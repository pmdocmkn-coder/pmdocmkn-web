<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Header Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #cbd5e1;
        }
    </style>
</head>

<body class="flex justify-center p-4">

    <!-- Mobile Device Simulator -->
    <div
        class="w-full max-w-[400px] h-[800px] bg-[#fafafa] rounded-[40px] shadow-2xl overflow-hidden border-[12px] border-slate-800 relative flex flex-col">

        <!-- App Content -->
        <div class="flex-1 overflow-y-auto pb-24 bg-gradient-to-b from-white to-[#f4f6fb]">

            <!-- ====== PREMIUM MOBILE HEADER ====== -->
            <div class="px-5 pt-8 pb-6">
                <!-- Back Button & Dynamic Title -->
                <div class="flex items-center gap-4 mb-8">
                    <button
                        class="w-[46px] h-[46px] shrink-0 flex items-center justify-center rounded-2xl bg-white shadow-[0_8px_20px_rgba(0,0,0,0.04)] border border-slate-100 text-slate-700 active:scale-95 transition-all outline-none">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-800">
                            <path d="m15 18-6-6 6-6" />
                        </svg>
                    </button>
                    <div class="flex-1 overflow-hidden">
                        <div class="flex items-center gap-2 mb-0.5">
                            <div class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
                            <p class="text-[10px] uppercase font-bold tracking-[0.2em] text-indigo-600">Dokumen</p>
                        </div>
                        <h1 class="text-[26px] font-black text-slate-900 leading-none tracking-tight truncate">Surat
                            Umum</h1>
                    </div>
                </div>

                <!-- ====== SEGMENTED TABS ====== -->
                <div class="w-full bg-slate-100/80 backdrop-blur-md rounded-2xl p-1.5 flex relative">
                    <div
                        class="absolute left-1.5 top-1.5 bottom-1.5 w-[32%] bg-white rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.06)] transition-all">
                    </div>
                    <button class="flex-1 relative z-10 py-2.5 text-[13px] font-bold text-indigo-700">Surat
                        Umum</button>
                    <button
                        class="flex-1 relative z-10 py-2.5 text-[13px] font-semibold text-slate-500 hover:text-slate-700 transition-colors">Gatepass</button>
                    <button
                        class="flex-1 relative z-10 py-2.5 text-[13px] font-semibold text-slate-500 hover:text-slate-700 transition-colors">Quotation</button>
                </div>
            </div>

            <!-- Content Area (Simulated) -->
            <div class="px-5">
                <!-- Search & Filters -->
                <div class="flex gap-2.5 mb-6">
                    <div
                        class="flex-1 bg-white h-12 rounded-2xl shadow-[0_4px_12px_rgba(0,0,0,0.02)] border border-slate-100 flex items-center px-4">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="text-slate-400 mr-3 shrink-0"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.3-4.3" />
                        </svg>
                        <input type="text" placeholder="Search surat..."
                            class="w-full bg-transparent text-[14px] font-medium focus:outline-none placeholder-slate-400 text-slate-800">
                    </div>
                    <button
                        class="w-12 h-12 shrink-0 bg-white rounded-2xl shadow-[0_4px_12px_rgba(0,0,0,0.02)] border border-slate-100 flex items-center justify-center text-slate-600 active:scale-95 transition-all">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                        </svg>
                    </button>
                </div>

                <!-- Quick Look at a modern Card -->
                <div class="space-y-4">
                    <div
                        class="bg-white p-5 rounded-3xl shadow-[0_8px_24px_rgba(0,0,0,0.03)] border border-slate-100 cursor-pointer hover:-translate-y-1 transition-transform">
                        <div class="flex justify-between items-start mb-3">
                            <span
                                class="px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold leading-none flex items-center gap-1.5">
                                <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full"></span>
                                Draft
                            </span>
                            <span class="text-[12px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-md">11 Feb
                                2026</span>
                        </div>
                        <h3 class="font-black text-[16px] text-slate-900 mb-1.5 tracking-tight">04/MKN/BA/II/2026</h3>
                        <p class="text-[13px] text-slate-500 mb-4 line-clamp-1 font-medium">Berita Acara Penyerahan
                            Perangkat MKN ke Site</p>

                        <div class="flex gap-2">
                            <div
                                class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 font-bold text-xs shrink-0">
                                MK</div>
                            <div class="flex-1 flex items-center">
                                <p class="text-xs font-medium text-slate-400">Penerima: <span
                                        class="text-slate-700 font-bold">PT. Multi Kontrol...</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile Bottom Action Button (Simulated) -->
        <button
            class="absolute bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-[0_8px_20px_rgba(79,70,229,0.3)] hover:scale-105 active:scale-95 transition-all z-20">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14" />
                <path d="M12 5v14" />
            </svg>
        </button>

    </div>

</body>

</html>
