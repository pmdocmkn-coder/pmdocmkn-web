<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Header Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #cbd5e1;
        }
    </style>
</head>

<body class="flex justify-center p-4">

    <!-- Mobile Device Simulator -->
    <div
        class="w-full max-w-[400px] h-[800px] bg-[#f8f9fc] rounded-[40px] shadow-2xl overflow-hidden border-[12px] border-slate-800 relative flex flex-col">

        <!-- ====== 1. GLOBAL LAYOUT HEADER (Simulasi Header Bawaan PM Dashboard) ====== -->
        <!-- Ini adalah header dari Layout.tsx yang sudah ada dengan tombol garis tiga (Hamburger Menu) -->
        <div class="h-16 bg-white border-b border-slate-100 flex items-center px-4 shrink-0 shadow-sm z-50 relative">
            <button class="w-10 h-10 flex items-center justify-center rounded-xl text-slate-500 hover:bg-slate-50">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="flex items-center gap-2 ml-2">
                <div
                    class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">
                    PM</div>
                <span class="font-bold text-slate-800">PM Dashboard</span>
            </div>
        </div>

        <!-- App Content (Scrollable Area) -->
        <div class="flex-1 overflow-y-auto bg-gradient-to-b from-white to-[#f8f9fc]">

            <!-- ====== 2. PAGE HEADER (Header Halaman Spesifik) ====== -->
            <!-- Memanfaatkan ruang di bawah Global Header tanpa membuat header sekunder tambahan yang "menempel/sticky" berulang -->
            <div class="px-5 pt-6 pb-2">

                <div class="flex items-start justify-between mb-6">
                    <div>
                        <!-- Breadcrumb / Context ringan -->
                        <div class="flex items-center gap-1.5 mb-1.5 opacity-80">
                            <span class="text-[11px] font-bold text-indigo-600 tracking-wider uppercase">Document
                                Center</span>
                        </div>
                        <!-- Judul Besar Dinamis (Berubah sesuai Tab) -->
                        <h1 class="text-[28px] font-black text-slate-900 leading-tight tracking-tight">Surat Umum</h1>
                    </div>

                    <!-- Tombol Back/Menu Kontekstual di Pojok Kanan Halaman (Opsional tapi Manis) -->
                    <button
                        class="w-[42px] h-[42px] rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center hover:bg-indigo-100 transition-colors shrink-0">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </button>
                </div>

                <!-- ====== 3. SEGMENTED TABS (Navigasi Antar Halaman) ====== -->
                <!-- Tab berbentuk kapsul yang diletakkan persis di bawah judul halaman. Desain ini sangat rapi karena membaur dengan latar belakang putih. -->
                <div
                    class="w-full bg-slate-100/70 p-1 rounded-xl flex relative mb-6 border border-slate-200/50 shadow-inner">
                    <!-- Indikator Tab Aktif (Simulasi CSS) -->
                    <div
                        class="absolute left-1 top-1 bottom-1 w-[33%] bg-white rounded-lg shadow-[0_2px_10px_rgba(0,0,0,0.06)] border border-slate-100/50 transition-all">
                    </div>

                    <button class="flex-1 relative z-10 py-2.5 text-[13px] font-bold text-indigo-700">Surat
                        Umum</button>
                    <button
                        class="flex-1 relative z-10 py-2.5 text-[13px] font-semibold text-slate-500 hover:text-slate-700 transition-colors">Gatepass</button>
                    <button
                        class="flex-1 relative z-10 py-2.5 text-[13px] font-semibold text-slate-500 hover:text-slate-700 transition-colors">Quotation</button>
                </div>
            </div>

            <!-- Content Area (Isi dari Tab aktif) -->
            <div class="px-5 pb-24 space-y-4">

                <!-- Filter Section -->
                <div
                    class="bg-white rounded-[20px] p-4 shadow-[0_8px_30px_rgba(0,0,0,0.03)] border border-slate-100 mb-2">
                    <div class="flex items-center gap-3 bg-slate-50 rounded-xl px-4 py-2 mb-3">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="text-indigo-400"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.3-4.3" />
                        </svg>
                        <input type="text" placeholder="Cari surat..."
                            class="bg-transparent border-none text-[14px] w-full focus:outline-none placeholder-slate-400">
                    </div>
                    <div class="flex gap-2">
                        <button
                            class="flex-1 flex justify-between items-center px-4 py-2 bg-indigo-50/50 text-indigo-700 text-xs font-semibold rounded-lg border border-indigo-100/50">
                            Company <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="m6 9 6 6 6-6" />
                            </svg>
                        </button>
                        <button
                            class="flex-1 flex justify-between items-center px-4 py-2 bg-indigo-50/50 text-indigo-700 text-xs font-semibold rounded-lg border border-indigo-100/50">
                            Type <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="m6 9 6 6 6-6" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Dummy Card -->
                <div
                    class="bg-white p-5 rounded-[20px] shadow-[0_8px_30px_rgba(0,0,0,0.04)] border border-slate-100 relative overflow-hidden group">
                    <div
                        class="absolute top-0 right-0 w-24 h-24 bg-indigo-50 rounded-bl-[100px] -z-10 transition-transform group-hover:scale-110">
                    </div>
                    <div class="flex justify-between items-start mb-3">
                        <span
                            class="px-2.5 py-1 bg-emerald-50 text-emerald-600 rounded-md text-[11px] font-bold leading-none">Sent</span>
                        <span class="text-[11px] font-bold text-slate-400">25/2/2026</span>
                    </div>
                    <h3 class="font-bold text-[15px] text-slate-900 mb-1 leading-tight tracking-tight">49/MKN/BA/II/2026
                    </h3>
                    <p class="text-[13px] text-slate-500 mb-4 line-clamp-1">Berita Acara Penitipan Material</p>
                    <div class="flex justify-between items-end border-t border-slate-50 pt-3">
                        <div class="text-[11px] font-medium text-slate-400">
                            <span class="text-indigo-600 font-bold">MKN</span> • BA
                        </div>
                        <div class="flex gap-2 text-slate-400">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                class="hover:text-indigo-600 cursor-pointer" stroke="currentColor" stroke-width="2">
                                <path d="m2 12 10-8 10 8" />
                                <path d="M22 12v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6" />
                            </svg>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Floating FAB Layered properly -->
        <button
            class="absolute bottom-6 right-6 px-5 h-14 bg-indigo-600 text-white rounded-[20px] flex items-center justify-center gap-2 shadow-[0_8px_20px_rgba(79,70,229,0.3)] hover:scale-105 active:scale-95 transition-all z-20 font-bold text-[15px]">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14" />
                <path d="M12 5v14" />
            </svg> Buat Surat
        </button>

    </div>

</body>

</html>
