<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; } </style>
</head>
<body class="flex justify-center p-4 sm:p-8">

    <div class="w-full max-w-[400px] h-[750px] bg-[#f7f6f8] rounded-[2.5rem] shadow-2xl overflow-hidden border-8 border-slate-900 relative flex flex-col">
        
        <header class="sticky top-0 z-10 flex items-center bg-[#f7f6f8] p-4 border-b border-[#9311d4]/10 justify-between">
            <button class="text-[#9311d4] flex size-10 shrink-0 items-center justify-center rounded-xl hover:bg-[#9311d4]/10 transition-colors cursor-pointer bg-white shadow-sm border border-[#9311d4]/10 active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            
            <div class="flex-1 text-center">
                <h2 class="text-slate-900 text-[17px] font-bold leading-tight tracking-tight">Surat Umum</h2>
                <p class="text-[11px] text-[#9311d4] font-bold uppercase tracking-widest mt-0.5">Administrasi</p>
            </div>
            
            <div class="flex size-10 items-center justify-end"></div>
        </header>

        <div class="flex bg-white px-2 pt-1 shadow-sm relative z-0">
            <button class="flex-1 pb-3 pt-3 px-1 text-[13px] font-bold text-[#9311d4] border-b-[3px] border-[#9311d4] transition-all">
                Surat Umum
            </button>
            <button class="flex-1 pb-3 pt-3 px-1 text-[13px] font-bold text-slate-400 border-b-[3px] border-transparent hover:text-slate-600 transition-all">
                Gatepass
            </button>
            <button class="flex-1 pb-3 pt-3 px-1 text-[13px] font-bold text-slate-400 border-b-[3px] border-transparent hover:text-slate-600 transition-all">
                Quotation
            </button>
        </div>

        <div class="flex-1 p-4 overflow-y-auto pb-24 space-y-3">
            <div class="w-full h-12 bg-white rounded-xl shadow-sm border border-[#9311d4]/10 flex items-center px-4 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#9311d4] mr-3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <span class="text-slate-400 text-sm font-medium">Cari sesuatu...</span>
            </div>
            
            <div class="w-full h-32 bg-white rounded-xl shadow-sm border border-[#9311d4]/10 p-4"></div>
            <div class="w-full h-32 bg-white rounded-xl shadow-sm border border-[#9311d4]/10 p-4"></div>
            <div class="w-full h-32 bg-white rounded-xl shadow-sm border border-[#9311d4]/10 p-4"></div>
        </div>

    </div>

</body>
</html>
